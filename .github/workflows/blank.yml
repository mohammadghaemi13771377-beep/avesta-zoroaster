export type SearchType = "all" | "verse" | "article" | "glossary" | "library" | "media" | "hub";

export type SearchDocument = {
  id: string;
  title: string;
  type: Exclude<SearchType, "all">;
  href: string;
  excerpt: string;
  section?: string;
  category?: string;
  tags?: string[];
  priority: number;
};

export type SearchResult = SearchDocument & {
  score: number;
  matchedFields: string[];
  snippet: string;
};

export const searchTypeLabels: Record<SearchType, string> = {
  all: "همه",
  verse: "متن اوستا",
  article: "مقاله",
