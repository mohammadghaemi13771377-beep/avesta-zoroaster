generator client {
  provider = "prisma-client-js"
}

datasource db {
  provider = "postgresql"
  url      = env("DATABASE_URL")
}

model AvestaSection {
  id          String          @id @default(cuid())
  title       String
  slug        String          @unique
  description String
  coverImage  String?
  themeColor  String?
  order       Int             @default(0)
  chapters    AvestaChapter[]
  translations AvestaSectionTranslation[]
  createdAt   DateTime        @default(now())
  updatedAt   DateTime        @updatedAt
}

model AvestaChapter {
  id          String         @id @default(cuid())
  sectionId   String
  section     AvestaSection  @relation(fields: [sectionId], references: [id], onDelete: Cascade)
  title       String
  slug        String
  number      Int
  description String?
  coverImage  String?
  order       Int            @default(0)
  verses      AvestaVerse[]
  translations AvestaChapterTranslation[]
  createdAt   DateTime       @default(now())
  updatedAt   DateTime       @updatedAt

  @@unique([sectionId, slug])
}

model AvestaVerse {
  id                    String        @id @default(cuid())
  chapterId             String
  chapter               AvestaChapter @relation(fields: [chapterId], references: [id], onDelete: Cascade)
  originalText           String
  transliteration        String?
  classicalTranslation   String?
  simpleRewrite          String?
  modernInterpretation   String?
  ethicalMessage         String?
  imageUrl               String?
  audioUrl               String?
  order                  Int           @default(0)
  glossaryTerms          GlossaryTerm[] @relation("GlossaryRelatedVerses")
  readingProgress        ReadingProgress[]
  translations           AvestaVerseTranslation[]
  createdAt              DateTime      @default(now())
  updatedAt              DateTime      @updatedAt

  @@unique([chapterId, order])
}

model Article {
  id             String         @id @default(cuid())
  title          String
  slug           String         @unique
  excerpt        String
  content        String
  coverImage     String?
  category       String?
  tags           String[]
  seoTitle       String?
  seoDescription String?
  publishedAt    DateTime?
  glossaryTerms  GlossaryTerm[] @relation("GlossaryRelatedArticles")
  translations   ArticleTranslation[]
  createdAt      DateTime       @default(now())
  updatedAt      DateTime       @updatedAt
}

model GlossaryTerm {
  id              String        @id @default(cuid())
  term            String
  slug            String        @unique
  meaning         String
  root            String?
  description     String?
  relatedArticles Article[]     @relation("GlossaryRelatedArticles")
  relatedVerses   AvestaVerse[] @relation("GlossaryRelatedVerses")
  translations     GlossaryTermTranslation[]
  createdAt       DateTime      @default(now())
  updatedAt       DateTime      @updatedAt
}

model LibraryItem {
  id          String   @id @default(cuid())
  title       String
  author      String?
  description String?
  fileUrl     String
  coverImage  String?
  language    String
  type        String
  source      String?
  translations LibraryItemTranslation[]
  createdAt   DateTime @default(now())
  updatedAt   DateTime @updatedAt

  @@unique([title, language])
}

model MediaAsset {
  id          String   @id @default(cuid())
  title       String
  slug        String   @unique
  type        String
  category    String
  description String
  url         String?
  thumbnail   String?
  prompt      String?
  mood        String?
  accent      String?
  sectionSlug String?
  chapterSlug String?
  verseOrder  Int?
  credit      String?
  status      String   @default("DRAFT")
  createdAt   DateTime @default(now())
  updatedAt   DateTime @updatedAt

  @@index([type])
  @@index([category])
  @@index([sectionSlug, chapterSlug, verseOrder])
}

model ImportJob {
  id           String   @id @default(cuid())
  name         String
  mode         String
  status       String
  contentCount Int      @default(0)
  mediaCount   Int      @default(0)
  failedCount  Int      @default(0)
  payload      Json
  result       Json
  createdAt    DateTime @default(now())

  @@index([status])
  @@index([createdAt])
}

model AvestaSectionTranslation {
  id          String        @id @default(cuid())
  sectionId   String
  section     AvestaSection @relation(fields: [sectionId], references: [id], onDelete: Cascade)
  locale      Locale
  title       String
  description String
  seoTitle    String?
  seoDescription String?
  createdAt   DateTime      @default(now())
  updatedAt   DateTime      @updatedAt

  @@unique([sectionId, locale])
}

model AvestaChapterTranslation {
  id          String        @id @default(cuid())
  chapterId   String
  chapter     AvestaChapter @relation(fields: [chapterId], references: [id], onDelete: Cascade)
  locale      Locale
  title       String
  description String?
  createdAt   DateTime      @default(now())
  updatedAt   DateTime      @updatedAt

  @@unique([chapterId, locale])
}

model AvestaVerseTranslation {
  id                    String       @id @default(cuid())
  verseId               String
  verse                 AvestaVerse  @relation(fields: [verseId], references: [id], onDelete: Cascade)
  locale                Locale
  originalText           String?
  transliteration        String?
  classicalTranslation   String?
  simpleRewrite          String?
  modernInterpretation   String?
  ethicalMessage         String?
  createdAt              DateTime     @default(now())
  updatedAt              DateTime     @updatedAt

  @@unique([verseId, locale])
}

model ArticleTranslation {
  id             String   @id @default(cuid())
  articleId      String
  article        Article  @relation(fields: [articleId], references: [id], onDelete: Cascade)
  locale         Locale
  title          String
  excerpt        String
  content        String
  seoTitle       String?
  seoDescription String?
  createdAt      DateTime @default(now())
  updatedAt      DateTime @updatedAt

  @@unique([articleId, locale])
}

model GlossaryTermTranslation {
  id          String       @id @default(cuid())
  termId      String
  term        GlossaryTerm @relation(fields: [termId], references: [id], onDelete: Cascade)
  locale      Locale
  termText    String
  meaning     String
  root        String?
  description String?
  createdAt   DateTime     @default(now())
  updatedAt   DateTime     @updatedAt

  @@unique([termId, locale])
}

model LibraryItemTranslation {
  id          String      @id @default(cuid())
  itemId      String
  item        LibraryItem @relation(fields: [itemId], references: [id], onDelete: Cascade)
  locale      Locale
  title       String
  author      String?
  description String?
  source      String?
  createdAt   DateTime    @default(now())
  updatedAt   DateTime    @updatedAt

  @@unique([itemId, locale])
}

model User {
  id                String             @id @default(cuid())
  email             String             @unique
  displayName       String
  passwordHash      String?
  role              UserRole           @default(READER)
  avatarUrl         String?
  lastLoginAt       DateTime?
  bookmarks         Bookmark[]
  readingProgress   ReadingProgress[]
  readingPreference ReadingPreference?
  createdAt         DateTime           @default(now())
  updatedAt         DateTime           @updatedAt
}

model Bookmark {
  id          String       @id @default(cuid())
  userId      String
  user        User         @relation(fields: [userId], references: [id], onDelete: Cascade)
  title       String
  targetType  BookmarkType
  targetUrl   String
  description String?
  createdAt   DateTime     @default(now())

  @@unique([userId, targetUrl])
}

model ReadingProgress {
  id         String        @id @default(cuid())
  userId     String
  user       User          @relation(fields: [userId], references: [id], onDelete: Cascade)
  verseId    String?
  verse      AvestaVerse?  @relation(fields: [verseId], references: [id], onDelete: SetNull)
  title      String
  targetUrl  String
  progress   Int           @default(0)
  lastReadAt DateTime      @default(now())
  createdAt  DateTime      @default(now())
  updatedAt  DateTime      @updatedAt

  @@unique([userId, targetUrl])
}

model ReadingPreference {
  id        String      @id @default(cuid())
  userId    String      @unique
  user      User        @relation(fields: [userId], references: [id], onDelete: Cascade)
  mode      ReadingMode @default(DARK)
  fontSize  Int         @default(18)
  audio     Boolean     @default(true)
  language  String      @default("fa")
  createdAt DateTime    @default(now())
  updatedAt DateTime    @updatedAt
}

enum UserRole {
  READER
  EDITOR
  ADMIN
}

enum BookmarkType {
  AVESTA_VERSE
  ARTICLE
  GLOSSARY_TERM
  HUB
  LIBRARY_ITEM
  MEDIA_ITEM
}

enum ReadingMode {
  DARK
  SEPIA
  LIGHT
}

enum Locale {
  FA
  EN
}



