name: Restore project source from ZIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Confirm source is present
        run: |
          test -f package.json
          test -d app
          test -d components
          test -d lib
          echo "AVESTA-ZOROASTER source is present."
