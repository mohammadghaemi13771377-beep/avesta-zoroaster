name: Restore project source from ZIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unpack source archive
        run: |
          set -euo pipefail
          test -f avesta-zoroaster-source.zip
          rm -rf _restore
          mkdir _restore
          unzip -q avesta-zoroaster-source.zip -d _restore
          cp -R _restore/. .
          rm -rf _restore

      - name: Keep repository deploy-friendly
        run: |
          cat > .gitignore <<'EOF'
          node_modules/
          .next/
          out/
          dist/
          build/
          .env
          .env.local
          .env.development.local
          .env.test.local
          .env.production.local
          npm-debug.log*
          yarn-debug.log*
          yarn-error.log*
          pnpm-debug.log*
          *.db
          *.sqlite
          *.sqlite3
          .DS_Store
          Thumbs.db
          .vscode/
          .idea/
          .vercel/
          EOF

      - name: Commit restored source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "Restore full AVESTA-ZOROASTER source"
            git push
          fi
